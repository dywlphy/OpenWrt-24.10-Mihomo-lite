name: OpenWrt 24.10 Lite Cloud Build

on:
  workflow_dispatch:

env:
  OPENWRT_VERSION: openwrt-24.10

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize environment
        run: |
          sudo apt-get update
          sudo apt-get install -y ack antlr3 asciidoc autoconf automake autopoint \
            binutils bison build-essential bzip2 ccache clang cmake cpio curl \
            device-tree-compiler diffutils file flex gawk gcc-multilib g++-multilib \
            gettext git gperf haveged help2man intltool libc6-dev-i386 libelf-dev \
            libglib2.0-dev libgmp-dev libmpc-dev libmpfr-dev libncurses5-dev \
            libpython3-dev libreadline-dev libssl-dev libtool liblzma-dev \
            libxml2-dev llvm lld make ninja-build patch perl pkgconf python3 \
            python3-pyelftools python3-setuptools qemu-utils quilt rsync \
            squashfs-tools tar unzip upx-ucl vim wget xsltproc xxd zlib1g-dev zstd

      - name: Clone OpenWrt source
        run: |
          git clone --depth 1 --branch $OPENWRT_VERSION https://github.com/openwrt/openwrt.git openwrt
          cd openwrt

      - name: Run diy-part1.sh
        run: |
          cd openwrt
          cp $GITHUB_WORKSPACE/24.10_diy-part1.sh ./
          chmod +x 24.10_diy-part1.sh
          bash 24.10_diy-part1.sh

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Run diy-part2.sh
        run: |
          cd openwrt
          cp $GITHUB_WORKSPACE/24.10_diy-part2.sh ./
          chmod +x 24.10_diy-part2.sh
          bash 24.10_diy-part2.sh

      - name: Load config
        run: |
          cd openwrt
          cp $GITHUB_WORKSPACE/24.10_config.txt .config
          make defconfig
          # 强制恢复 i18n 包（defconfig 会错误丢弃）
          grep "^CONFIG_PACKAGE_luci-i18n-.*-zh-cn=y" $GITHUB_WORKSPACE/24.10_config.txt 2>/dev/null | sed 's/^CONFIG_PACKAGE_//;s/=y$//' | while read pkg; do
              if [ -n "$pkg" ]; then
                  sed -i "s/# CONFIG_PACKAGE_${pkg} is not set/CONFIG_PACKAGE_${pkg}=y/" .config
              fi
          done
          echo "i18n 中文包已恢复"

      - name: Download dependencies
        run: |
          cd openwrt
          make download -j$(nproc) || make download -j1 V=s

      - name: Build firmware
        id: compile
        run: |
          cd openwrt
          make -j$(nproc) V=s || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Set environment variables
        if: steps.compile.outputs.status == 'success'
        run: |
          DEVICE_NAME="x86-64"
          FILE_DATE=$(date +"%Y%m%d-%H%M")
          echo "DEVICE_NAME=$DEVICE_NAME" >> $GITHUB_ENV
          echo "FILE_DATE=$FILE_DATE" >> $GITHUB_ENV

      - name: Package firmware
        if: steps.compile.outputs.status == 'success'
        run: |
          cd openwrt
          mkdir -p release
          cp bin/targets/x86/64/*.img.gz release/ 2>/dev/null || true
          cp bin/targets/x86/64/*.ext4* release/ 2>/dev/null || true
          cp bin/targets/x86/64/*rootfs.tar* release/ 2>/dev/null || true
          cp bin/targets/x86/64/*.sha256sums release/ 2>/dev/null || true

      - name: Upload to GitHub Release
        if: steps.compile.outputs.status == 'success'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v24.10-lite-${{ env.FILE_DATE }}
          name: OpenWrt 24.10 Lite ${{ env.FILE_DATE }}
          body: |
            ## OpenWrt 24.10 Lite Build

            **构建时间**: ${{ env.FILE_DATE }}
            **目标**: x86_64

            ### 功能特性
            - ✅ LuCI 中文界面
            - ✅ OpenClash 代理
            - ✅ IPv6 完整支持
            - ✅ 硬件流量卸载 (flow offloading)
            - ✅ USB 支持
            - ✅ 多文件系统 (ext4/ntfs/exfat/vfat/cifs)
            - ✅ 多镜像格式 (squashfs/ext4/rootfs.tar)

            ### 使用说明
            1. 写入 img.gz 到磁盘（squashfs 标准固件）
            2. ext4 镜像适合 LXC/Docker 容器使用
            3. rootfs.tar 可直接作为 LXC 容器模板
            4. 默认 IP: 192.168.1.1
            5. 默认用户名: root，密码: admin
          files: openwrt/release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload firmware artifact
        uses: actions/upload-artifact@main
        if: steps.compile.outputs.status == 'success' && !cancelled()
        with:
          name: OpenWrt_24.10_Lite_${{ env.FILE_DATE }}
          path: openwrt/bin/targets/*/*
